<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexión · puedolav.ar</title>
    <meta name="theme-color" content="#10251d" />
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #10251d;
        color: #ecfff4;
      }

      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 1.25rem;
        background:
          radial-gradient(circle at 20% 10%, rgba(116, 227, 164, 0.28), transparent 18rem),
          #10251d;
      }

      main {
        width: min(100%, 28rem);
        border: 1px solid rgba(236, 255, 244, 0.16);
        border-radius: 1.5rem;
        padding: 1.25rem;
        background: rgba(13, 32, 25, 0.88);
        box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.28);
      }

      .icon {
        width: 4rem;
        height: 4rem;
        display: grid;
        place-items: center;
        border-radius: 1.25rem;
        background: #74e3a4;
        font-size: 2rem;
      }

      h1 {
        margin: 1rem 0 0.5rem;
        font-size: 1.8rem;
        line-height: 1;
      }

      p {
        color: rgba(236, 255, 244, 0.78);
        line-height: 1.45;
      }

      a {
        display: inline-flex;
        margin-top: 0.75rem;
        border-radius: 999px;
        padding: 0.75rem 1rem;
        background: #74e3a4;
        color: #07130f;
        text-decoration: none;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">💧</div>
      <h1>Sin conexión</h1>
      <p>
        No pudimos actualizar el clima. Si ya consultaste antes, la app puede mostrar últimos datos guardados al volver.
      </p>
      <p>
        Revisá tu conexión e intentá nuevamente.
      </p>
      <a href="/puedolav-ar/">Volver a intentar</a>
    </main>
  </body>
</html>
